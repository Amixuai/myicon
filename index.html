
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roshan Icons - Showcase</title>
    
    <link rel="stylesheet" href="icon.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            padding: 20px;
            margin: 0;
        }
        h1 { text-align: center; color: #333; }
        
        .category-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .category-title {
            font-size: 1.4em;
            color: #555;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        
        /* Icons ko horizontal line me set karne ke liye flexbox */
        .icon-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .icon-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 160px;
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background-color: #fafafa;
        }
        .icon-card .ri {
            font-size: 2.5em; /* Icon ko bada karke dekhne ke liye */
            margin-bottom: 15px;
        }
        
        .code-snippet {
            background-color: #eee;
            color: #d63384;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            font-family: monospace;
            user-select: all; /* Ek click me pura code select ho jayega */
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Roshan Icons - Test Library</h1>

    <div class="category-section">
        <div class="category-title">YouTube Icons (Bina Colour Wale - Font Test)</div>
        <div class="icon-row">
            
            <div class="icon-card">
                <i class="ri ri-font ri-youtube" style="color: red;"></i>
                <div class="code-snippet">&lt;i class="ri ri-font ri-youtube"&gt;&lt;/i&gt;</div>
            </div>

            <div class="icon-card">
                <i class="ri ri-font ri-youtube-shorts" style="color: #222;"></i>
                <div class="code-snippet">&lt;i class="ri ri-font ri-youtube-shorts"&gt;&lt;/i&gt;</div>
            </div>

            <div class="icon-card">
                <i class="ri ri-font ri-youtube-outline" style="color: blue;"></i>
                <div class="code-snippet">&lt;i class="ri ri-font ri-youtube-outline"&gt;&lt;/i&gt;</div>
            </div>

        </div>
    </div>

</body>
</html>
